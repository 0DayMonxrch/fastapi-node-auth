<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexacore - Registration Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* CYSCOM Dark Cyber Palette */
            --bg-dark: #000000;
            --text-dark: #ffffff;
            --nav-dark: rgba(5, 5, 5, 0.85);
            
            /* High Contrast Light Palette */
            --bg-light: #f4f4f5;
            --text-light: #09090b;
            --nav-light: #ffffff;
            
            /* Accents */
            --accent-yellow: #faff6b;
            --accent-blue: #00d2ff;
            --accent-blue-dim: rgba(0, 210, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-light);
            min-height: 100vh;
            transition: background-color 0.4s ease, color 0.4s ease;
            display: flex;
            flex-direction: column;
            /* Page load transition */
            animation: systemBoot 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0; 
        }

        /* --- THE CYBER DARK THEME --- */
        body.dark { 
            background-color: var(--bg-dark); 
            color: var(--text-dark); 
            background-image: 
                linear-gradient(var(--accent-blue-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--accent-blue-dim) 1px, transparent 1px);
            background-size: 40px 40px;
            background-attachment: fixed;
        }

        /* --- FIXED SCATTERED CYSCOM BACKGROUND --- */
        .scatter-container {
            position: fixed;
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            pointer-events: none; 
            z-index: -1; 
            overflow: hidden;
        }

        .bg-letter {
            position: absolute;
            opacity: 0; 
            transition: opacity 0.8s ease;
        }

        body.dark .bg-letter { opacity: 0.15; }

        .l-c1 { top: 40%; left: 5%; width: 20vw; transform: rotate(-10deg); }
        .l-y  { top: 10%; left: 15%; width: 18vw; transform: rotate(10deg); }
        .l-s  { top: 10%; left: 31%; width: 20vw; transform: rotate(5deg); }
        .l-c2 { top: 10%; right: 29%; width: 20vw; transform: rotate(-5deg); }
        .l-o  { top: 11%; right: 8%; width: 22vw; transform: rotate(-4deg); }
        .l-m  { bottom: 10%; right: 5%; width: 22vw; transform: rotate(6deg); }

        .bg-letter text {
            font-family: 'Anton', sans-serif;
            font-size: 85px;
            fill: transparent; 
            stroke: var(--accent-blue);
            stroke-width: 2px;
            stroke-dasharray: 600;
            stroke-dashoffset: 500;
            filter: drop-shadow(0 0 8px var(--accent-blue));
        }

        body.dark .bg-letter text {
            animation: drawScattered 3s ease-in-out forwards;
        }

        @keyframes drawScattered { to { stroke-dashoffset: 0; } }

        /* --- NAVBAR --- */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 2rem; background-color: var(--nav-light);
            position: sticky; top: 0; z-index: 10;
            border-bottom: 1px solid #e5e5e5;
        }

        body.dark .navbar { 
            background-color: var(--nav-dark); 
            border-bottom: 1px solid rgba(0, 210, 255, 0.2); 
            backdrop-filter: blur(10px);
        }

        .brand { 
            font-family: 'Anton', sans-serif; font-size: 1.5rem; 
            letter-spacing: 1px; color: inherit; text-decoration: none;
        }

        .theme-toggle-btn {
            background-color: transparent; color: var(--text-light);
            border: 2px solid #000; padding: 0.5rem 1.25rem;
            border-radius: 999px; font-family: 'Roboto Mono', monospace;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }

        body.dark .theme-toggle-btn {
            color: var(--accent-blue); border-color: var(--accent-blue);
            text-shadow: 0 0 5px rgba(0, 210, 255, 0.5);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        body.dark .theme-toggle-btn:hover { background-color: rgba(0, 210, 255, 0.1); }

        /* --- MAIN CONTENT & FORM STYLES --- */
        main { 
            flex: 1; display: flex; flex-direction: column;
            align-items: center; padding: 2rem; position: relative;
        }

        .hero-title {
            font-family: 'Anton', sans-serif;
            font-size: clamp(3rem, 6vw, 5rem);
            letter-spacing: 4px; text-transform: uppercase;
            margin-bottom: 1rem; line-height: 1; text-align: center;
        }

        body.dark .hero-title { text-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }

        .mono-text {
            font-family: 'Roboto Mono', monospace; font-size: 1.1rem;
            max-width: 600px; line-height: 1.6; margin: 0 auto 2rem auto; text-align: center;
        }

        .dark-only { display: none; width: 100%; max-width: 500px; }
        .light-only { display: block; color: #666; }

        body.dark .dark-only { display: block; animation: fadeIn 0.8s ease-in-out; }
        body.dark .light-only { display: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Form Container */
        .form-container {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid var(--accent-blue-dim);
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 1.5rem; text-align: left; }

        .input-group label {
            display: block; margin-bottom: 0.5rem;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.9rem; color: var(--accent-blue);
        }

        .input-group input[type="text"],
        .input-group input[type="email"],
        .input-group input[type="tel"] {
            width: 100%; padding: 0.85rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px; color: var(--text-dark);
            font-family: 'Inter', sans-serif; font-size: 1rem;
            transition: all 0.3s ease; outline: none;
        }

        .input-group input:focus {
            border-color: var(--accent-yellow);
            background: rgba(250, 255, 107, 0.05);
            box-shadow: 0 0 10px rgba(250, 255, 107, 0.2);
        }

        .radio-options { display: flex; gap: 2rem; margin-top: 0.5rem; }
        .radio-label {
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            font-family: 'Inter', sans-serif; font-size: 1rem; color: #e5e5e5;
        }
        input[type="radio"] { accent-color: var(--accent-blue); transform: scale(1.2); }

        /* Buttons */
        .action-btn {
            width: 100%; padding: 1rem; margin-top: 1rem;
            border-radius: 999px; border: none;
            font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1.5px;
            cursor: pointer; transition: all 0.2s ease-in-out;
        }

        .btn-primary {
            background-color: var(--accent-yellow); color: #000000;
            box-shadow: 0 0 15px rgba(250, 255, 107, 0.3);
            animation: pulse-glow 2s infinite;
        }
        .btn-primary:hover {
            transform: translateY(-2px); box-shadow: 0 0 25px rgba(250, 255, 107, 0.6);
        }

        .msg {
            padding: 1rem; border-radius: 6px; margin-bottom: 1.5rem;
            font-family: 'Roboto Mono', monospace; font-size: 0.9rem;
            text-align: center; display: none;
        }
        .msg.error { background: rgba(255, 50, 50, 0.1); color: #ff5555; border: 1px solid #ff5555; }
        .msg.success { background: rgba(0, 210, 255, 0.1); color: var(--accent-blue); border: 1px solid var(--accent-blue); }

        /* Animations & Modals */
        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--accent-blue), -2px 0 var(--accent-yellow); }
            25% { text-shadow: -2px 0 var(--accent-blue), 2px 0 var(--accent-yellow); }
            50% { text-shadow: 2px 0 var(--accent-yellow), -2px 0 var(--accent-blue); }
            75% { text-shadow: -2px 0 var(--accent-yellow), 2px 0 var(--accent-blue); }
            100% { text-shadow: 2px 0 var(--accent-blue), -2px 0 var(--accent-yellow); }
        }

        body.dark .dark-glitch:hover { animation: glitch 0.2s infinite; color: #fff; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        body.dark .mono-text::after {
            content: '_'; display: inline-block; color: var(--accent-blue);
            animation: blink 1s step-end infinite; margin-left: 5px;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px rgba(250, 255, 107, 0.3); }
            50% { box-shadow: 0 0 25px rgba(250, 255, 107, 0.7); }
            100% { box-shadow: 0 0 10px rgba(250, 255, 107, 0.3); }
        }

        .scanline-text { position: relative; display: inline-block; }
        body.dark .scanline-text::after {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(transparent 50%, rgba(0, 0, 0, 0.65) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 2;
        }

        @keyframes systemBoot {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        body.system-shutdown {
            animation: accessGranted 0.5s cubic-bezier(0.5, 0, 0.2, 1) forwards;
            overflow: hidden;
        }

        @keyframes accessGranted {
            0%   { transform: scale(1) translate(0, 0); filter: brightness(1); }
            10%  { transform: scale(0.99) translate(-3px, 0); filter: brightness(1.3); text-shadow: 3px 0 var(--accent-blue); } 
            20%  { transform: scale(0.99) translate(3px, 0); filter: brightness(1.5); text-shadow: -3px 0 var(--accent-yellow); }
            30%  { transform: scale(1) translate(0, 0); filter: brightness(1.8) drop-shadow(0 0 20px var(--accent-blue)); } 
            100% { transform: scale(1.3); filter: blur(12px) brightness(0); opacity: 0; } 
        }

        /* Modal specific styling to match theme */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background: var(--bg-dark); border: 1px solid var(--accent-blue);
            padding: 2.5rem; border-radius: 12px; width: 90%; max-width: 420px;
            text-align: center; box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }
        .modal-content h2 { font-family: 'Anton', sans-serif; color: var(--accent-yellow); letter-spacing: 2px; }
        .whatsapp-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background-color: transparent; color: #25D366; border: 2px solid #25D366;
            text-decoration: none; padding: 12px; border-radius: 999px;
            font-weight: 600; margin: 1.5rem 0; transition: all 0.2s;
        }
        .whatsapp-btn:hover { background-color: #25D366; color: #000; }
        .proceed-btn {
            background: transparent; color: var(--text-dark); border: none;
            text-decoration: underline; cursor: pointer; font-family: 'Roboto Mono';
            transition: color 0.2s;
        }
        .proceed-btn:hover { color: var(--accent-blue); }

    </style>
</head>
<body>
    <div class="scatter-container">
        <svg class="bg-letter l-c1" viewBox="0 0 100 100"><text x="50%" y="50%" dominant-baseline="central" text-anchor="middle">C</text></svg>
        <svg class="bg-letter l-y"  viewBox="0 0 100 100"><text x="50%" y="50%" dominant-baseline="central" text-anchor="middle">Y</text></svg>
        <svg class="bg-letter l-s"  viewBox="0 0 100 100"><text x="50%" y="50%" dominant-baseline="central" text-anchor="middle">S</text></svg>
        <svg class="bg-letter l-c2" viewBox="0 0 100 100"><text x="50%" y="50%" dominant-baseline="central" text-anchor="middle">C</text></svg>
        <svg class="bg-letter l-o"  viewBox="0 0 100 100"><text x="50%" y="50%" dominant-baseline="central" text-anchor="middle">O</text></svg>
        <svg class="bg-letter l-m"  viewBox="0 0 100 100"><text x="50%" y="50%" dominant-baseline="central" text-anchor="middle">M</text></svg>
    </div>

    <nav class="navbar">
        <a href="index.html" class="brand">CYSCOM</a>
        <div class="nav-right">
            <button id="theme-toggle" class="theme-toggle-btn">INITIATE DARK MODE</button>
        </div>
    </nav>

    <main>
        <h1 class="hero-title dark-glitch scanline-text">REGISTRATION</h1>
        
        <p class="mono-text light-only">
            [ System Locked ] <br><br>
            Please switch to the dark mode to decrypt further information and access the event registration portal.
        </p>

        <div class="dark-only">
            <div class="form-container">
                <div id="status-msg" class="msg"></div>
                
                <form id="registration-form">
                    <div class="input-group">
                        <label for="fullname">Student Name</label>
                        <input type="text" id="fullname" placeholder="Your Name" required />
                    </div>

                    <div class="input-group">
                        <label>Are you a VITian?</label>
                        <div class="radio-options">
                            <label class="radio-label">
                                <input type="radio" name="vit-status" id="vit-yes" value="yes" checked /> Yes
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="vit-status" id="vit-no" value="no" /> No
                            </label>
                        </div>
                    </div>

                    <div class="input-group" id="regno-container">
                        <label for="regno">Registration ID (for Non-VITians -> None)</label>
                        <input type="text" id="regno" placeholder="25XXX1234" />
                    </div>

                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="alias@domain.com" required />
                    </div>

                    <div class="input-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" placeholder="9876543210" required />
                    </div>

                    <div class="input-group">
                        <label for="college">College</label>
                        <input type="text" id="college" placeholder="ABC college" required />
                    </div>

                    <button type="button" id="reg-btn" class="action-btn btn-primary">Establish Link</button>
                </form>
            </div>
        </div>
    </main>

    <div id="competition-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>ACCESS GRANTED</h2>
            <p class="mono-text" style="margin: 1.5rem 0; color: #d1d5db;">
                Credentials verified. Schedule generated:<br><br>
                <span style="color: var(--accent-blue); font-weight: bold; font-size: 1.2rem;">June 22, 2026 | 7:00 PM</span>
            </p>
            
            <a href="https://chat.whatsapp.com/your-invite-link" target="_blank" class="whatsapp-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                Join Our Official WhatsApp Group
            </a>
            <br>
            <button class="proceed-btn" id="return-home-btn">Return to Mainframe</button>
        </div>
    </div>

    <script>
        // --- 1. THEME MANAGEMENT ---
        const body = document.body;
        const themeBtn = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme') || 'light';

        function applyTheme(theme) {
            if (theme === 'dark') {
                body.classList.add('dark');
                themeBtn.textContent = 'RESTORE LIGHT MODE';
            } else {
                body.classList.remove('dark');
                themeBtn.textContent = 'INITIATE DARK MODE';
            }
            localStorage.setItem('theme', theme);
        }

        applyTheme(savedTheme);

        themeBtn.addEventListener('click', () => {
            const newTheme = body.classList.contains('dark') ? 'light' : 'dark';
            applyTheme(newTheme);
        });

        // --- 2. SEAMLESS PAGE TRANSITIONS ---
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                const targetUrl = this.getAttribute('href');
                if (targetUrl && targetUrl !== '#' && !targetUrl.startsWith('http')) {
                    e.preventDefault(); 
                    document.body.classList.add('system-shutdown');
                    setTimeout(() => { window.location.href = targetUrl; }, 400); 
                }
            });
        });

        // --- 3. CONDITIONAL FORM LOGIC ---
        const vitYesRadio = document.getElementById('vit-yes');
        const vitNoRadio = document.getElementById('vit-no');
        const regnoContainer = document.getElementById('regno-container');
        const regnoInput = document.getElementById('regno');

        function toggleRegNo() {
            if (vitYesRadio.checked) {
                regnoContainer.style.display = 'block';
            } else {
                regnoContainer.style.display = 'none';
                regnoInput.value = ''; 
            }
        }

        vitYesRadio.addEventListener('change', toggleRegNo);
        vitNoRadio.addEventListener('change', toggleRegNo);

        // --- 4. FORM SUBMISSION ---
        const BASE_URL = 'http://127.0.0.1:8000';
        
        function showMsg(type, text) {
            const msgBox = document.getElementById('status-msg');
            msgBox.style.display = 'block';
            msgBox.className = 'msg ' + type;
            msgBox.textContent = '> ' + text;
        }

        let isSubmitting = false;

        document.getElementById('reg-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            
            if (isSubmitting) return; // Prevent double clicks / flooding

            const full_name = document.getElementById('fullname').value.trim();
            const registration_number = regnoInput.value.trim();
            const email = document.getElementById('email').value.trim();
            const phone_number = document.getElementById('phone').value.trim();
            const college_name = document.getElementById('college').value.trim();
            const is_vit = vitYesRadio.checked;

            // --- Zod-like Validation Rules ---
            const nameRegex = /^[A-Za-z\s]{3,50}$/;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const phoneRegex = /^[0-9]{10}$/; // Basic 10-digit check
            const regnoRegex = /^[0-9]{2}[A-Za-z]{3}[0-9]{4}$/i; // E.g., 25XXX1234

            if (!full_name || !email || !phone_number || !college_name) {
                return showMsg('error', 'ERR: MISSING_PARAMETERS');
            }
            if (!nameRegex.test(full_name)) {
                return showMsg('error', 'ERR: INVALID_NAME_FORMAT');
            }
            if (!emailRegex.test(email)) {
                return showMsg('error', 'ERR: INVALID_EMAIL_FORMAT');
            }
            if (!phoneRegex.test(phone_number)) {
                return showMsg('error', 'ERR: INVALID_PHONE_NUMBER (10 Digits Required)');
            }
            
            if (is_vit) {
                if (!registration_number) {
                    return showMsg('error', 'ERR: REG_ID_REQUIRED_FOR_VIT');
                }
                if (!regnoRegex.test(registration_number)) {
                    return showMsg('error', 'ERR: INVALID_REG_ID (Expected format: 25XXX1234)');
                }
            }

            try {
                isSubmitting = true;
                const btn = document.getElementById('reg-btn');
                const originalText = btn.textContent;
                btn.textContent = 'TRANSMITTING...';
                btn.disabled = true;

                const response = await fetch(`${BASE_URL}/register-participant`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name, registration_number, email, phone_number, college_name, is_vit })
                });
                
                const data = await response.json();
                
                if (response.ok && data.status === 'success') {
                    showMsg('success', 'SYS_MSG: UPLOAD_COMPLETE');
                    document.getElementById('competition-modal').style.display = 'flex';
                } else {
                    showMsg('error', 'ERR: ' + (data.error || 'UPLOAD_FAILED'));
                }
                
                btn.textContent = originalText;
                btn.disabled = false;
                isSubmitting = false;

            } catch { 
                showMsg('error', 'ERR: NO_CONNECTION_TO_HOST'); 
                const btn = document.getElementById('reg-btn');
                btn.textContent = 'Establish Link';
                btn.disabled = false;
                isSubmitting = false;
            }
        });

        // Modal Proceed Button Animation Handler
        document.getElementById('return-home-btn').addEventListener('click', () => {
            document.body.classList.add('system-shutdown');
            setTimeout(() => { window.location.href = 'index.html'; }, 400);
        });
    </script>
</body>
</html>
