<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Hexacore</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* CYSCOM Dark Cyber Palette */
      --bg-dark: #000000;
      --text-dark: #ffffff;
      --card-dark: rgba(5, 5, 5, 0.85);
      
      /* High Contrast Light Palette */
      --bg-light: #f4f4f5; 
      --text-light: #09090b; 
      --card-light: #ffffff;
      
      /* Accents */
      --accent-yellow: #faff6b;
      --accent-blue: #00d2ff;
      --accent-blue-dim: rgba(0, 210, 255, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-light); 
      color: var(--text-light);
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      transition: background-color 0.4s ease, color 0.4s ease;
      /* Page transition in */
      animation: systemBoot 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    /* --- PAGE TRANSITION EFFECTS --- */
    @keyframes systemBoot {
        from { opacity: 0; transform: scale(0.98) translateY(10px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
    }

    body.system-shutdown {
    animation: accessGranted 0.5s cubic-bezier(0.5, 0, 0.2, 1) forwards;
    overflow: hidden;
}

@keyframes accessGranted {
    0%   { transform: scale(1) translate(0, 0); filter: brightness(1); }
    10%  { transform: scale(0.99) translate(-3px, 0); filter: brightness(1.3); text-shadow: 3px 0 var(--accent-blue); } 
    20%  { transform: scale(0.99) translate(3px, 0); filter: brightness(1.5); text-shadow: -3px 0 var(--accent-yellow); }
    30%  { transform: scale(1) translate(0, 0); filter: brightness(1.8) drop-shadow(0 0 20px var(--accent-blue)); } 
    100% { transform: scale(1.3); filter: blur(12px) brightness(0); opacity: 0; } 
}

    /* --- THE CYBER DARK THEME --- */
    body.dark { 
      background-color: var(--bg-dark); 
      color: var(--text-dark); 
      background-image: 
          linear-gradient(var(--accent-blue-dim) 1px, transparent 1px),
          linear-gradient(90deg, var(--accent-blue-dim) 1px, transparent 1px);
      background-size: 40px 40px;
      background-attachment: fixed;
    }

    /* --- THE REGISTRATION CARD --- */
    .card {
      width: 100%; 
      max-width: 420px;
      background-color: var(--card-light);
      padding: 2.5rem 2rem; 
      border-radius: 0; 
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      position: relative;
    }

    body.dark .card { 
      background-color: var(--card-dark); 
      border: 1px solid rgba(0, 210, 255, 0.2);
      box-shadow: 0 0 30px rgba(0, 210, 255, 0.05);
      backdrop-filter: blur(10px);
    }

    /* Cyber Crosshair corners for the card */
    body.dark .card::before,
    body.dark .card::after {
        content: '';
        position: absolute;
        width: 15px;
        height: 15px;
        border: 2px solid var(--accent-blue);
        pointer-events: none;
    }
    body.dark .card::before {
        top: -1px; left: -1px;
        border-right: none; border-bottom: none;
    }
    body.dark .card::after {
        bottom: -1px; right: -1px;
        border-left: none; border-top: none;
    }

    /* --- TYPOGRAPHY --- */
    h2 { 
      font-family: 'Anton', sans-serif;
      font-size: 3rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 0.5rem; 
      line-height: 1;
    }

    /* Targeted CRT Scanlines for the Header */
    .scanline-text { position: relative; display: inline-block; }
    body.dark .scanline-text::after {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(transparent 50%, rgba(0, 0, 0, 0.65) 50%);
        background-size: 100% 4px;
        pointer-events: none;
        z-index: 2;
    }

    p.subtitle { 
      font-family: 'Roboto Mono', monospace;
      font-size: 0.9rem; 
      margin-bottom: 2rem; 
      color: #64748b;
    }
    body.dark p.subtitle { color: #94a3b8; }

    /* --- FORM INPUTS --- */
    .field { margin-bottom: 1.25rem; }
    
    input {
      width: 100%; 
      padding: 0.75rem 1rem;
      border-radius: 4px; 
      border: 1px solid #cbd5e1; 
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    body.dark input { 
      border-color: rgba(0, 210, 255, 0.3); 
      background-color: rgba(0, 210, 255, 0.05); 
      color: var(--accent-yellow); 
      font-family: 'Roboto Mono', monospace; 
    }

    body.dark input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
      background-color: rgba(0, 0, 0, 0.5);
    }

    body.dark input::placeholder {
      color: rgba(148, 163, 184, 0.5);
    }

    /* --- BUTTONS --- */
    .btn {
      width: 100%; 
      padding: 0.75rem 1rem; 
      border-radius: 999px;
      border: 1px solid transparent; 
      background-color: #09090b;
      color: #ffffff; 
      font-size: 0.95rem; 
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer; 
      margin-top: 0.5rem;
      transition: all 0.2s ease;
    }

    body.dark .btn {
      background-color: var(--accent-yellow);
      color: #000000;
      box-shadow: 0 0 10px rgba(250, 255, 107, 0.2);
    }
    
    body.dark .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(250, 255, 107, 0.4);
    }

    .btn.outline { 
      background-color: transparent; 
      color: inherit; 
      border-color: #64748b; 
    }

    body.dark .btn.outline {
      color: var(--accent-blue);
      border-color: var(--accent-blue);
      box-shadow: none;
    }

    body.dark .btn.outline:hover:not(:disabled) {
      background-color: rgba(0, 210, 255, 0.1);
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
    }

    .btn + .btn { margin-top: 1rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* --- MISC UI ELEMENTS --- */
    .top-actions { display: flex; justify-content: space-between; margin-bottom: 2rem; align-items: center; }
    .top-actions a { font-size: 0.9rem; font-family: 'Roboto Mono', monospace; color: var(--accent-blue); text-decoration: none; font-weight: 600; }
    .top-actions a:hover { text-shadow: 0 0 8px rgba(0, 210, 255, 0.5); }
    .top-actions button { width: auto; padding: 0.4rem 1rem; font-size: 0.8rem; font-family: 'Roboto Mono', monospace; }

    .divider { text-align: center; margin: 1.5rem 0; font-size: 0.85rem; position: relative; font-family: 'Roboto Mono', monospace; text-transform: uppercase; color: #64748b; }
    .divider::before, .divider::after { content: ""; position: absolute; top: 50%; width: 40%; height: 1px; background-color: #cbd5e1; }
    .divider::before { left: 0; } .divider::after { right: 0; }
    body.dark .divider::before, body.dark .divider::after { background-color: rgba(0, 210, 255, 0.3); }

    .msg { margin-top: 1rem; font-size: 0.85rem; font-family: 'Roboto Mono', monospace; padding: 0.75rem; border-radius: 4px; display: none; text-align: center; }
    .msg.error   { background: #fee2e2; color: #b91c1c; display: block; border: 1px solid #f87171; }
    .msg.success { background: #dcfce7; color: #166534; display: block; border: 1px solid #4ade80; }
    body.dark .msg.error { background: rgba(220, 38, 38, 0.1); color: #fca5a5; border: 1px solid #ef4444; text-shadow: 0 0 5px rgba(239, 68, 68, 0.5); }
    body.dark .msg.success { background: rgba(34, 197, 94, 0.1); color: #86efac; border: 1px solid #22c55e; text-shadow: 0 0 5px rgba(34, 197, 94, 0.5); }

    #otp-verify-section { display: none; }
    #resend-timer { font-size: 0.85rem; margin-top: 0.5rem; opacity: 0.8; font-family: 'Roboto Mono', monospace; text-align: center; }
    
    small { display: block; margin-top:1.5rem; font-size:0.85rem; text-align: center; font-family: 'Roboto Mono', monospace;}
    small a { color: var(--accent-blue); text-decoration: none; font-weight: bold;}
    small a:hover { text-decoration: underline; text-shadow: 0 0 8px rgba(0, 210, 255, 0.5); }

.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(4px);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

/* Modal Box */
.modal-content {
  background: var(--bg-color, #1e1e1e);
  color: var(--text-color, #ffffff);
  padding: 30px;
  border-radius: 8px;
  border: 1px solid #333;
  width: 90%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.modal-details {
  font-size: 1.1rem;
  line-height: 1.5;
  margin: 20px 0;
}

.modal-actions {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-top: 25px;
}

/* WhatsApp Button Styling */
.whatsapp-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background-color: #25D366;
  color: white;
  text-decoration: none;
  padding: 12px;
  border-radius: 6px;
  font-weight: bold;
  font-size: 1rem;
  transition: background-color 0.2s;
}

.whatsapp-btn:hover {
  background-color: #1ebe57;
}

/* Proceed Button Styling */
.proceed-btn {
  background: transparent;
  color: inherit;
  border: 1px solid #555;
  padding: 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1rem;
  transition: all 0.2s;
}

.proceed-btn:hover {
  background: #040404;
}

  </style>
</head>
<body>
  <div class="card">
    <div class="top-actions">
      <a href="/public/index.html">&lt; RETURN</a>
      <button id="theme-toggle" class="btn outline">INITIATE DARK MODE</button>
    </div>
    <h2 class="scanline-text">REGISTER</h2>
    <p class="subtitle">Establish your credentials in the Hexacore system.</p>

    <div id="standard-reg">
      <div class="field">
        <input type="text" id="userid" placeholder="Enter Call-Sign or ID" />
      </div>
      <div class="field">
        <input type="password" id="password" placeholder="Secure Passphrase (min 8 char)" minlength="8" />
      </div>
      <button id="reg-btn" class="btn">Initialize Account</button>
      <div id="msg-standard" class="msg"></div>
    </div>

    <div class="divider">or bypass</div>

    <div id="email-reg">
      <div class="field">
        <input type="email" id="email" placeholder="Target Email Address" />
      </div>
      <div class="field">
        <input type="password" id="email-password" placeholder="Secure Passphrase (min 8 char)" minlength="8" />
      </div>
      <button id="email-reg-btn" class="btn outline">Register via Secure Email</button>
      <div id="msg-email" class="msg"></div>
    </div>

    <div id="otp-verify-section">
      <p style="font-size:0.9rem;margin-bottom:0.75rem; font-family: 'Roboto Mono', monospace; color: var(--accent-blue);">
        A decryption key was sent to <br><strong id="otp-email-display" style="color: var(--text-dark);"></strong>.
      </p>
      <div class="field">
        <input type="text" id="otp-input" placeholder="Awaiting 6-digit key..." maxlength="6" />
      </div>
      <button id="verify-otp-btn" class="btn">Verify &amp; Complete</button>
      <button id="resend-otp-btn" class="btn outline">Resend Key</button>
      <div id="resend-timer"></div>
      <div id="msg-otp" class="msg"></div>
    </div>

    <small>Already registered? <a href="/login">Login here</a></small>
  </div>

  <script>
    // ---- Theme ----
    const body     = document.body;
    const themeBtn = document.getElementById('theme-toggle');
    function applyTheme(t) {
      body.classList.toggle('dark', t === 'dark');
      themeBtn.textContent = t === 'dark' ? 'RESTORE LIGHT MODE' : 'INITIATE DARK MODE';
      localStorage.setItem('theme', t);
    }
    applyTheme(localStorage.getItem('theme') || 'light');
    themeBtn.addEventListener('click', () => applyTheme(body.classList.contains('dark') ? 'light' : 'dark'));

    // --- SEAMLESS PAGE TRANSITIONS ---
    document.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', function(e) {
            const targetUrl = this.getAttribute('href');
            if (targetUrl && targetUrl !== '#' && !targetUrl.startsWith('http')) {
                e.preventDefault(); 
                document.body.classList.add('system-shutdown');
                setTimeout(() => { window.location.href = targetUrl; }, 400); 
            }
        });
    });

    function showMsg(id, type, text) {
      const el = document.getElementById(id);
      el.className = 'msg ' + type;
      el.textContent = text;
    }

    // ---- Standard register ----
    document.getElementById('reg-btn').addEventListener('click', async () => {
      const userid   = document.getElementById('userid').value.trim();
      const password = document.getElementById('password').value;
      if (!userid || !password) return showMsg('msg-standard', 'error', 'All fields are required');
      if (password.length < 8) return showMsg('msg-standard', 'error', 'Passphrase must be at least 8 characters');
      try {
        const r = await fetch('http://127.0.0.1:8000/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userid, password })
        });
        const data = await r.json();
        if (r.ok && data.status === 'success') {
          showMsg('msg-standard', 'success', 'Account initialized! Redirecting...');
          document.getElementById('competition-modal').style.display = 'flex';
        } else {
          showMsg('msg-standard', 'error', data.error || 'Initialization failed');
        }
      } catch { showMsg('msg-standard', 'error', 'Connection to server lost'); }
    });

    // ---- Email register (triggers OTP) ----
    let pendingEmail = '';

    document.getElementById('email-reg-btn').addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('email-password').value;
      if (!email || !password) return showMsg('msg-email', 'error', 'All fields are required');
      if (password.length < 8) return showMsg('msg-email', 'error', 'Passphrase must be at least 8 characters');
      try {
        const r = await fetch('http://127.0.0.1:8000/register-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userid: email, password })
        });
        const data = await r.json();
        if (r.ok && data.status === 'otp_sent') {
          pendingEmail = email;
          document.getElementById('otp-email-display').textContent = email;
          document.getElementById('standard-reg').style.display = 'none';
          document.getElementById('email-reg').style.display     = 'none';
          document.querySelector('.divider').style.display        = 'none';
          document.getElementById('otp-verify-section').style.display = 'block';
          showMsg('msg-otp', 'success', 'Key transmitted! Check your inbox.');
          startResendCooldown();
        } else {
          showMsg('msg-email', 'error', data.error || 'Initialization failed');
        }
      } catch { showMsg('msg-email', 'error', 'Connection to server lost'); }
    });

    // ---- OTP verify ----
    document.getElementById('verify-otp-btn').addEventListener('click', async () => {
      const otp = document.getElementById('otp-input').value.trim();
      if (!otp) return showMsg('msg-otp', 'error', 'Please enter the key');
      try {
        const r = await fetch('http://127.0.0.1:8000/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: pendingEmail, otp, purpose: 'register' })
        });
        const data = await r.json();
        if (r.ok && data.status === 'success') {
          showMsg('msg-otp', 'success', 'System verified! Redirecting...');
          document.getElementById('competition-modal').style.display = 'flex';
        } else {
          showMsg('msg-otp', 'error', data.error || 'Invalid Key');
        }
      } catch { showMsg('msg-otp', 'error', 'Connection to server lost'); }
    });

    // ---- Resend OTP ----
    let resendTimer = null;
    function startResendCooldown() {
      let secs = 60;
      const el = document.getElementById('resend-timer');
      document.getElementById('resend-otp-btn').disabled = true;
      el.textContent = `Transmission locked for ${secs}s`;
      resendTimer = setInterval(() => {
        secs--;
        if (secs <= 0) {
          clearInterval(resendTimer);
          document.getElementById('resend-otp-btn').disabled = false;
          el.textContent = '';
        } else { el.textContent = `Transmission locked for ${secs}s`; }
      }, 1000);
    }

    document.getElementById('resend-otp-btn').addEventListener('click', async () => {
      try {
        const r = await fetch('http://127.0.0.1:8000/send-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: pendingEmail, purpose: 'register' })
        });
        const data = await r.json();
        if (r.ok) {
          showMsg('msg-otp', 'success', 'Key resent! Check your inbox.');
          startResendCooldown();
        } else {
          showMsg('msg-otp', 'error', data.error || 'Failed to resend key');
        }
      } catch { showMsg('msg-otp', 'error', 'Connection to server lost'); }
    });
  </script>
  <div id="competition-modal" class="modal-overlay" style="display: none;">
  <div class="modal-content">
    <h2>Access Granted</h2>
    <p class="modal-details">
      Welcome! Webinar will be held on:<br>
      <strong>22nd June from 7:00PM to 9:00PM</strong><br>
      Please note it in your calender. ;)
    </p>
    
    <div class="modal-actions">
      <a href="https://chat.whatsapp.com/FtkqZKVP7J9KhKD3pcznju?s=sw&p=i&ilr=0" target="_blank" class="whatsapp-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        Join the WhatsApp Group
      </a>
      <button class="proceed-btn" onclick="document.body.classList.add('system-shutdown'); setTimeout(() => window.location.href='index.html', 400);">Proceed to Dashboard</button>
    </div>
  </div>
</div>
</body>
</html>
