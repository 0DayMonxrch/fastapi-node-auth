<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Hexacore</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* CYSCOM Dark Cyber Palette */
      --bg-dark: #000000;
      --text-dark: #ffffff;
      --card-dark: rgba(5, 5, 5, 0.85);
      
      /* High Contrast Light Palette */
      --bg-light: #f4f4f5; 
      --text-light: #09090b; 
      --card-light: #ffffff;
      
      /* Accents */
      --accent-yellow: #faff6b;
      --accent-blue: #00d2ff;
      --accent-blue-dim: rgba(0, 210, 255, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-light); 
      color: var(--text-light);
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    /* --- THE CYBER DARK THEME --- */
    body.dark { 
      background-color: var(--bg-dark); 
      color: var(--text-dark); 
      background-image: 
          linear-gradient(var(--accent-blue-dim) 1px, transparent 1px),
          linear-gradient(90deg, var(--accent-blue-dim) 1px, transparent 1px);
      background-size: 40px 40px;
      background-attachment: fixed;
    }

    /* --- THE LOGIN CARD --- */
    .card {
      width: 100%; 
      max-width: 420px;
      background-color: var(--card-light);
      padding: 2.5rem 2rem; 
      border-radius: 0; /* Sharp corners for cyber feel */
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      position: relative;
    }

    body.dark .card { 
      background-color: var(--card-dark); 
      border: 1px solid rgba(0, 210, 255, 0.2);
      box-shadow: 0 0 30px rgba(0, 210, 255, 0.05);
      backdrop-filter: blur(10px);
    }

    /* Cyber Crosshair corners for the card */
    body.dark .card::before,
    body.dark .card::after {
        content: '';
        position: absolute;
        width: 15px;
        height: 15px;
        border: 2px solid var(--accent-blue);
        pointer-events: none;
    }
    body.dark .card::before {
        top: -1px; left: -1px;
        border-right: none; border-bottom: none;
    }
    body.dark .card::after {
        bottom: -1px; right: -1px;
        border-left: none; border-top: none;
    }

    /* --- TYPOGRAPHY --- */
    h2 { 
      font-family: 'Anton', sans-serif;
      font-size: 3rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 0.5rem; 
      line-height: 1;
    }

    /* Targeted CRT Scanlines for the Header */
    .scanline-text { position: relative; display: inline-block; }
    body.dark .scanline-text::after {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(transparent 50%, rgba(0, 0, 0, 0.65) 50%);
        background-size: 100% 4px;
        pointer-events: none;
        z-index: 2;
    }

    p.subtitle { 
      font-family: 'Roboto Mono', monospace;
      font-size: 0.9rem; 
      margin-bottom: 2rem; 
      color: #64748b;
    }
    body.dark p.subtitle { color: #94a3b8; }

    /* --- FORM INPUTS (Terminal Style) --- */
    .field { margin-bottom: 1.25rem; }
    
    input {
      width: 100%; 
      padding: 0.75rem 1rem;
      border-radius: 4px; 
      border: 1px solid #cbd5e1; 
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    body.dark input { 
      border-color: rgba(0, 210, 255, 0.3); 
      background-color: rgba(0, 210, 255, 0.05); 
      color: var(--accent-yellow); 
      font-family: 'Roboto Mono', monospace; /* Monospace typing in dark mode */
    }

    body.dark input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
      background-color: rgba(0, 0, 0, 0.5);
    }

    body.dark input::placeholder {
      color: rgba(148, 163, 184, 0.5);
    }

    /* --- BUTTONS --- */
    .btn {
      width: 100%; 
      padding: 0.75rem 1rem; 
      border-radius: 999px;
      border: 1px solid transparent; 
      background-color: #09090b;
      color: #ffffff; 
      font-size: 0.95rem; 
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer; 
      margin-top: 0.5rem;
      transition: all 0.2s ease;
    }

    body.dark .btn {
      background-color: var(--accent-yellow);
      color: #000000;
      box-shadow: 0 0 10px rgba(250, 255, 107, 0.2);
    }
    
    body.dark .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(250, 255, 107, 0.4);
    }

    .btn.outline { 
      background-color: transparent; 
      color: inherit; 
      border-color: #64748b; 
    }

    body.dark .btn.outline {
      color: var(--accent-blue);
      border-color: var(--accent-blue);
      box-shadow: none;
    }

    body.dark .btn.outline:hover:not(:disabled) {
      background-color: rgba(0, 210, 255, 0.1);
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
    }

    .btn + .btn { margin-top: 1rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* --- MISC UI ELEMENTS --- */
    .divider {
      text-align: center; 
      margin: 1.5rem 0; 
      font-size: 0.85rem; 
      position: relative;
      font-family: 'Roboto Mono', monospace;
      text-transform: uppercase;
      color: #64748b;
    }
    .divider::before, .divider::after {
      content: ""; 
      position: absolute; 
      top: 50%; 
      width: 40%; 
      height: 1px; 
      background-color: #cbd5e1;
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }
    body.dark .divider::before, body.dark .divider::after { background-color: rgba(0, 210, 255, 0.3); }

    .top-actions { 
      display: flex; 
      justify-content: space-between; 
      margin-bottom: 2rem; 
      align-items: center; 
    }
    
    .top-actions a { 
      font-size: 0.9rem; 
      font-family: 'Roboto Mono', monospace;
      color: var(--accent-blue); 
      text-decoration: none; 
      font-weight: 600;
    }
    
    .top-actions a:hover { text-shadow: 0 0 8px rgba(0, 210, 255, 0.5); }
    
    .top-actions button { 
      width: auto; 
      padding: 0.4rem 1rem; 
      font-size: 0.8rem; 
      font-family: 'Roboto Mono', monospace;
    }

    /* Terminal-style status messages */
    .msg { 
      margin-top: 1rem; 
      font-size: 0.85rem; 
      font-family: 'Roboto Mono', monospace;
      padding: 0.75rem; 
      border-radius: 4px; 
      display: none; 
      text-align: center;
    }
    .msg.error   { background: #fee2e2; color: #b91c1c; display: block; border: 1px solid #f87171; }
    .msg.success { background: #dcfce7; color: #166534; display: block; border: 1px solid #4ade80; }
    
    body.dark .msg.error { 
      background: rgba(220, 38, 38, 0.1); 
      color: #fca5a5; 
      border: 1px solid #ef4444;
      text-shadow: 0 0 5px rgba(239, 68, 68, 0.5);
    }
    body.dark .msg.success { 
      background: rgba(34, 197, 94, 0.1); 
      color: #86efac; 
      border: 1px solid #22c55e;
      text-shadow: 0 0 5px rgba(34, 197, 94, 0.5);
    }

    #otp-section, #email-otp-section { display: none; }
    #resend-timer { font-size: 0.85rem; margin-top: 0.5rem; opacity: 0.8; font-family: 'Roboto Mono', monospace; text-align: center; }
    
    .footer-text { margin-top:1.5rem; font-size:0.85rem; text-align: center; font-family: 'Roboto Mono', monospace;}
    .footer-text a { color: var(--accent-blue); text-decoration: none; font-weight: bold;}
    .footer-text a:hover { text-decoration: underline; text-shadow: 0 0 8px rgba(0, 210, 255, 0.5); }


/* --- PAGE TRANSITION EFFECTS --- */
body {
    /* This makes the page smoothly fade and scale in when it loads */
    animation: systemBoot 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0; /* Starts invisible until the animation runs */
}

@keyframes systemBoot {
    from { opacity: 0; transform: scale(0.98) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}

/* This class gets added via JavaScript when the user clicks a link */
/* --- AGGRESSIVE GLITCH TRANSITION --- */
body.system-shutdown {
    animation: accessGranted 0.5s cubic-bezier(0.5, 0, 0.2, 1) forwards;
    overflow: hidden;
}

@keyframes accessGranted {
    0%   { transform: scale(1) translate(0, 0); filter: brightness(1); }
    10%  { transform: scale(0.99) translate(-3px, 0); filter: brightness(1.3); text-shadow: 3px 0 var(--accent-blue); } 
    20%  { transform: scale(0.99) translate(3px, 0); filter: brightness(1.5); text-shadow: -3px 0 var(--accent-yellow); }
    30%  { transform: scale(1) translate(0, 0); filter: brightness(1.8) drop-shadow(0 0 20px var(--accent-blue)); } 
    100% { transform: scale(1.3); filter: blur(12px) brightness(0); opacity: 0; } 
}




  </style>
</head>
<body>
  <div class="card">
    <div class="top-actions">
      <a href="/public/index.html">&lt; RETURN</a>
      <button id="theme-toggle" class="btn outline">INITIATE DARK MODE</button>
    </div>
    
    <h2 class="scanline-text">LOGIN</h2>
    <p class="subtitle">Authenticate to access the Hexacore system.</p>

    <div id="standard-section">
      <form id="login-form">
        <div class="field">
          <input type="text" id="userid" placeholder="Enter ID or Email" required />
        </div>
        <div class="field">
          <input type="password" id="password" placeholder="Enter Password" required />
        </div>
        <button type="submit" class="btn">Login</button>
      </form>
    </div>

    <div id="msg-standard" class="msg"></div>

    <div class="divider">or bypass</div>

    <div id="email-otp-section">
      <div class="field">
        <input type="email" id="otp-email" placeholder="Enter target email address" />
      </div>
      <button id="send-otp-btn" class="btn outline">Transmit OTP</button>
      <div id="resend-timer"></div>
      
      <div id="otp-section">
        <div class="field" style="margin-top:1rem;">
          <input type="text" id="otp-input" placeholder="Awaiting 6-digit key..." maxlength="6" />
        </div>
        <button id="verify-otp-btn" class="btn">Verify &amp; Override</button>
      </div>
      
      <div id="msg-otp" class="msg"></div>
      <button id="back-btn" class="btn outline" style="margin-top:1rem;">Cancel Bypass</button>
    </div>

    <button id="toggle-email-otp" class="btn outline">Login via OTP Bypass</button>

    <p class="footer-text">New operator? <a href="/register">Create an account</a></p>
  </div>

  <script>
    // ---- Theme ----
    const body     = document.body;
    const themeBtn = document.getElementById('theme-toggle');
    
    function applyTheme(t) {
      body.classList.toggle('dark', t === 'dark');
      // Changed text to match the Hexacore "hacking" vibe
      themeBtn.textContent = t === 'dark' ? 'RESTORE LIGHT MODE' : 'INITIATE DARK MODE';
      localStorage.setItem('theme', t);
    }
    
    // Automatically apply theme from localStorage (carries over from index.html!)
    applyTheme(localStorage.getItem('theme') || 'light');
    
    themeBtn.addEventListener('click', () => applyTheme(body.classList.contains('dark') ? 'light' : 'dark'));

    // ---- Sections ----
    const standardSec    = document.getElementById('standard-section');
    const emailOtpSec    = document.getElementById('email-otp-section');
    const otpSection     = document.getElementById('otp-section');
    const toggleBtn      = document.getElementById('toggle-email-otp');
    const backBtn        = document.getElementById('back-btn');

    toggleBtn.addEventListener('click', () => {
      standardSec.style.display  = 'none';
      emailOtpSec.style.display  = 'block';
      toggleBtn.style.display    = 'none';
    });
    backBtn.addEventListener('click', () => {
      standardSec.style.display = 'block';
      emailOtpSec.style.display = 'none';
      toggleBtn.style.display   = 'block';
      otpSection.style.display  = 'none';
    });

    // ---- Standard login ----
    function showMsg(id, type, text) {
      const el = document.getElementById(id);
      el.className = 'msg ' + type;
      el.textContent = text;
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const userid   = document.getElementById('userid').value.trim();
      const password = document.getElementById('password').value;
      try {
        const r = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userid, password })
        });
        const data = await r.json();
        if (r.ok && data.status === 'success') {
          showMsg('msg-standard', 'success', 'Access Granted. Redirecting...');
          setTimeout(() => window.location.href = '/', 800);
        } else {
          showMsg('msg-standard', 'error', data.error || 'Access Denied');
        }
      } catch { showMsg('msg-standard', 'error', 'Connection to server lost'); }
    });

    // ---- OTP login ----
    let resendTimer = null;
    function startResendCooldown() {
      let secs = 60;
      const el = document.getElementById('resend-timer');
      document.getElementById('send-otp-btn').disabled = true;
      el.textContent = `Transmission locked for ${secs}s`;
      resendTimer = setInterval(() => {
        secs--;
        if (secs <= 0) {
          clearInterval(resendTimer);
          document.getElementById('send-otp-btn').disabled = false;
          el.textContent = '';
        } else { el.textContent = `Transmission locked for ${secs}s`; }
      }, 1000);
    }

    document.getElementById('send-otp-btn').addEventListener('click', async () => {
      const email = document.getElementById('otp-email').value.trim();
      if (!email) return showMsg('msg-otp', 'error', 'Target email required');
      try {
        const r = await fetch('/send-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, purpose: 'login' })
        });
        const data = await r.json();
        if (r.ok && data.status === 'otp_sent') {
          showMsg('msg-otp', 'success', 'OTP Transmitted. Check inbox.');
          otpSection.style.display = 'block';
          startResendCooldown();
        } else {
          showMsg('msg-otp', 'error', data.error || 'Transmission failed');
        }
      } catch { showMsg('msg-otp', 'error', 'Connection to server lost'); }
    });

    document.getElementById('verify-otp-btn').addEventListener('click', async () => {
      const email = document.getElementById('otp-email').value.trim();
      const otp   = document.getElementById('otp-input').value.trim();
      if (!otp) return showMsg('msg-otp', 'error', 'Decryption key required');
      try {
        const r = await fetch('/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, otp, purpose: 'login' })
        });
        const data = await r.json();
        if (r.ok && data.status === 'success') {
          showMsg('msg-otp', 'success', 'Override Successful. Redirecting...');
          setTimeout(() => window.location.href = '/', 800);
        } else {
          showMsg('msg-otp', 'error', data.error || 'Invalid Key');
        }
      } catch { showMsg('msg-otp', 'error', 'Connection to server lost'); }
    });

// --- SEAMLESS PAGE TRANSITIONS ---
// Find all links that navigate to other pages
document.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', function(e) {
        const targetUrl = this.getAttribute('href');
        
        // Only intercept if it's a real link to another page (not '#' or external)
        if (targetUrl && targetUrl !== '#' && !targetUrl.startsWith('http')) {
            e.preventDefault(); // Stop the browser from instantly jumping
            
            // Trigger the "dive in" exit animation
            document.body.classList.add('system-shutdown');
            
            // Wait exactly 400ms (matching the CSS animation) before loading the new page
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 400); 
        }
    });
});

  </script>
</body>
</html>
