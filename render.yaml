services:
  # --- Python FastAPI backend ---
  - type: web
    name: fastapi-node-auth-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8080

  # --- Static HTML frontend ---
  - type: web
    name: hexacore-web
    env: static
    staticPublishPath: ./public
    buildCommand: ""
